<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Clock</title>
	<style>
		html {
			background: #000000;
			font-family: sans-serif;
			font-weight: bold;
			color: #FFFFFF;
		}
		html, body {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
			overflow: hidden;
		}
		body {
			display: flex;
			justify-content: center;
			align-items: center;
		}
		div#clocktext {
			font-size: 25vw;
			line-height: 1;
			text-align: center;
			cursor: default;
			user-select: none;
			-moz-user-select: none;
			-webkit-user-select: none;
		}
	</style>
</head>
<body>
	<div id="clocktext"></div>

	<script>
		"use strict";

		let textElem = document.getElementById("clocktext");

		function updateClock() {
			let d = new Date();
			let h = d.getHours();
			let m = d.getMinutes();
			let s = d.getSeconds();
			
			let hStr = (h < 10 ? "0" : "") + h;
			let mStr = (m < 10 ? "0" : "") + m;
			let sStr = (s < 10 ? "0" : "") + s;
			
			textElem.textContent = hStr + ":" + mStr + ":" + sStr;
		}

		updateClock();
		setInterval(updateClock, 1000);
	</script>
</body>
</html>
